# 自动生成：由 scripts/build.mjs 生成，请勿手动编辑。
# Bind this URL in Clash Party to load these rule providers and rules.
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    include-all: true
  - name: "⚡ 自动选择"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    include-all: true
  - name: "🤖 AI"
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    filter: "(?i)(?:^|[\\s_\\-\\[])(?:JP|JPN|Japan|日本|Tokyo|東京|Osaka|大阪|🇯🇵)(?:$|[\\s_\\-\\]\\)])"
    empty-fallback: "REJECT"
  - name: "🪟 Microsoft"
    type: select
    proxies:
      - "⚡ 自动选择"
      - "DIRECT"
    include-all: true
  - name: "📺 流媒体"
    type: select
    proxies:
      - "⚡ 自动选择"
      - "DIRECT"
    include-all: true
  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "⚡ 自动选择"
      - "DIRECT"
    include-all: true
