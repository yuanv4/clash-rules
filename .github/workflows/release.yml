name: Build And Publish Rule Providers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/release.yml"
      - "scripts/build.mjs"
      - "sources.json"
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - name: Build rule providers
        run: bun scripts/build.mjs

      - name: Sync release branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin release
          release_worktree="${RUNNER_TEMP}/clash-rules-release"
          git worktree add --detach "$release_worktree" origin/release
          trap 'git worktree remove --force "$release_worktree"' EXIT

          git -C "$release_worktree" rm -r -- .
          mkdir -p "$release_worktree/rules"
          cp -- dist/rules/*.yaml "$release_worktree/rules/"
          cp -- dist/clash-party-override.yaml "$release_worktree/"

          git -C "$release_worktree" add -A
          mapfile -d '' -t tracked_files < <(git -C "$release_worktree" ls-files --cached -z)
          if [[ "${#tracked_files[@]}" -ne 14 ]]; then
            echo "Expected exactly 14 tracked publication artifacts, found ${#tracked_files[@]}." >&2
            exit 1
          fi
          for tracked_file in "${tracked_files[@]}"; do
            case "$tracked_file" in
              rules/*.yaml) ;;
              clash-party-override.yaml) ;;
              *)
                echo "Unexpected tracked release artifact: $tracked_file" >&2
                exit 1
                ;;
            esac
          done

          if git -C "$release_worktree" diff --cached --quiet; then
            echo "No artifact changes to publish."
            exit 0
          fi

          git -C "$release_worktree" config user.name "github-actions[bot]"
          git -C "$release_worktree" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$release_worktree" commit -m "Publish rule providers for run ${{ github.run_number }}"
          git -C "$release_worktree" push origin HEAD:release
